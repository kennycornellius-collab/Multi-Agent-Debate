<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Multi-Agent Debate &amp; Build Pipeline</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="run-form">
    <h1>Multi-Agent Debate &amp; Build Pipeline</h1>
    <div class="form-row">
      <label for="mode-select">Mode</label>
      <select id="mode-select">
        <option value="full">Full (debate + build)</option>
        <option value="debate_only">Debate only (spec, no code)</option>
        <option value="build_only">Build only (paste a spec)</option>
      </select>
    </div>
    <div class="form-row" id="idea-row">
      <textarea id="idea" rows="2" placeholder="Describe a project idea, e.g. a CLI tool that renames photos by EXIF date"></textarea>
    </div>
    <div class="form-row" id="spec-row" hidden>
      <textarea id="spec-text" rows="6" placeholder="Paste your own spec/schema here -- the build agents (Architect/Coder/Reviewer/Tester) use it as-is, no debate phase runs."></textarea>
    </div>
    <div class="form-row" id="rounds-row">
      <label for="rounds">Debate rounds</label>
      <input type="number" id="rounds" min="1" max="8" value="3">
    </div>
    <div class="form-row">
      <button id="run-btn" type="button">Run</button>
    </div>
    <div class="form-row" id="model-row">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="">Default</option>
      </select>
      <span id="model-status" class="model-status"></span>
      <label for="effort-slider">Effort</label>
      <input type="range" id="effort-slider" min="0" max="5" step="1" value="0">
      <span id="effort-label">Default</span>
    </div>
    <p id="run-error" class="error-banner" hidden></p>
  </header>

  <div id="progress-bar">
    <div id="progress-fill"></div>
    <span id="progress-label">Idle</span>
  </div>

  <main id="feeds">
    <section id="debate-feed" class="feed">
      <h2>Debate</h2>
      <div class="feed-body"></div>
    </section>
    <section id="build-feed" class="feed">
      <h2>Build</h2>
      <div class="feed-body"></div>
    </section>
  </main>

  <section id="output-panel">
    <h2>Output Files</h2>
    <div id="output-body">
      <ul id="file-list"></ul>
      <pre id="file-view">Select a file to view its contents.</pre>
    </div>
  </section>

  <script src="/static/app.js" defer></script>
</body>
</html>
