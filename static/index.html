<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Multi-Agent Debate &amp; Build Pipeline</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="run-form">
    <h1>Multi-Agent Debate &amp; Build Pipeline</h1>
    <div class="form-row">
      <textarea id="idea" rows="2" placeholder="Describe a project idea, e.g. a CLI tool that renames photos by EXIF date"></textarea>
    </div>
    <div class="form-row">
      <label for="rounds">Debate rounds</label>
      <input type="number" id="rounds" min="1" max="8" value="3">
      <button id="run-btn" type="button">Run</button>
    </div>
    <p id="run-error" class="error-banner" hidden></p>
  </header>

  <div id="progress-bar">
    <div id="progress-fill"></div>
    <span id="progress-label">Idle</span>
  </div>

  <main id="feeds">
    <section id="debate-feed" class="feed">
      <h2>Debate</h2>
      <div class="feed-body"></div>
    </section>
    <section id="build-feed" class="feed">
      <h2>Build</h2>
      <div class="feed-body"></div>
    </section>
  </main>

  <section id="output-panel">
    <h2>Output Files</h2>
    <div id="output-body">
      <ul id="file-list"></ul>
      <pre id="file-view">Select a file to view its contents.</pre>
    </div>
  </section>

  <script src="/static/app.js" defer></script>
</body>
</html>
